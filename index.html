<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Quiz Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .ios-blur { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tap:active { transform: scale(0.95); background: #007AFF; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app" class="w-full max-w-sm ios-blur p-8 rounded-[30px] shadow-2xl text-center">
        </div>

    <script>
        // YOUR CUSTOM DATA
        const quiz = [
            { q: "Which 90s London Garage legend is part of the 'Dream Team'?", a: ["DJ Luck", "DJ Slimzee", "Mike Ruffcut Lloyd", "Scott Garcia"], c: "Mike Ruffcut Lloyd" },
            { q: "In Marvel's X-Men, who is known as 'Logan'?", a: ["Cyclops", "Beast", "Wolverine", "Gambit"], c: "Wolverine" },
            { q: "Which Stephen King book features a plague called 'Captain Trips'?", a: ["It", "The Stand", "Cujo", "Misery"], c: "The Stand" },
            { q: "Which artist sang 'Sexual Healing'?", a: ["Teddy Pendergrass", "Marvin Gaye", "Bill Withers", "Michael Jackson"], c: "Marvin Gaye" }
        ];

        let state = { step: 'start', score: 0, currentQ: 0 };

        function render() {
            const app = document.getElementById('app');
            if (state.step === 'start') {
                app.innerHTML = `
                    <h1 class="text-3xl font-black mb-2 uppercase tracking-tighter">Quiz Party</h1>
                    <p class="text-zinc-500 mb-8">Ready to play with the boys?</p>
                    <button onclick="start()" class="w-full py-4 bg-white text-black rounded-2xl font-bold btn-tap">START GAME</button>
                `;
            } else if (state.step === 'play') {
                const q = quiz[state.currentQ];
                app.innerHTML = `
                    <div class="mb-4 text-xs font-bold text-zinc-500">QUESTION ${state.currentQ + 1}/${quiz.length}</div>
                    <h2 class="text-xl font-bold mb-8">${q.q}</h2>
                    <div class="space-y-3">
                        ${q.a.map(opt => `<button onclick="check('${opt}')" class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800 text-left btn-tap">${opt}</button>`).join('')}
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <h1 class="text-4xl font-black mb-2">FINISHED!</h1>
                    <p class="text-2xl mb-8">${state.score} / ${quiz.length}</p>
                    <button onclick="location.reload()" class="w-full py-4 bg-blue-600 rounded-2xl font-bold">REPLAY</button>
                `;
            }
        }

        window.start = () => { state.step = 'play'; render(); };
        window.check = (ans) => {
            if (ans === quiz[state.currentQ].c) state.score++;
            state.currentQ++;
            if (state.currentQ >= quiz.length) state.step = 'end';
            render();
        };

        render();
    </script>
</body>
</html>
