<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Family Quiz Party</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }

        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; display: inline-block !important; }

</head>
