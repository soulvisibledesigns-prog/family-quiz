<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Party - Host Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg-card { background: #0a0a0a; border: 1px solid #222; border-radius: 24px; }
        .timer-ring { transition: stroke-dashoffset 1s linear; stroke: #007AFF; }
        .player-pill { background: #1a1a1a; border: 1px solid #333; transition: all 0.3s; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; display: inline-block !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div id="game-ui" class="w-full max-w-4xl">
        <div class="animate-pulse font-bold tracking-tighter">SETTING UP GAME HUB...</div>
    </div>

    <script>
        let peer, roomCode = "";
        let players = [];
        let state = {
            step: 'start',
            targetPlayers: 2,
            currentIdx: 0,
            questions: [],
            timer: 20,
            revealTimer: 5,
            isRevealed: false
        };

        function render() {
            const ui = document.getElementById('game-ui');
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoin = urlParams.get('join');

            // --- PLAYER JOIN VIEW ---
            if (autoJoin || state.role === 'player') {
                renderPlayerView(ui, autoJoin);
                return;
            }

            // --- HOST VIEWS ---
            if (state.step === 'start') {
                ui.innerHTML = `
                    <div class="bg-card p-12 max-w-md mx-auto shadow-2xl">
                        <h1 class="text-5xl font-black mb-10 italic tracking-tighter uppercase">Quiz Hub</h1>
                        <div class="mb-8">
                            <p class="text-xs font-bold text-zinc-500 uppercase mb-4">Players Joining Tonight?</p>
                            <div class="flex justify-center gap-3">
                                ${[2,3,4,8].map(n => `<button onclick="state.targetPlayers=${n};render()" class="w-14 h-14 rounded-full font-bold ${state.targetPlayers==n?'bg-blue-600 border-transparent':'bg-zinc-900 border border-zinc-700'}">${n}</button>`).join('')}
                            </div>
                        </div>
                        <button onclick="initHost()" class="w-full py-5 bg-white text-black font-bold rounded-2xl hover:bg-zinc-200 transition">CREATE ROOM</button>
                    </div>`;
            } else if (state.step === 'lobby') {
                ui.innerHTML = `
                    <div class="bg-card p-12 flex flex-col items-center shadow-2xl">
                        <div id="qrcode" class="mb-6"></div>
                        <p class="text-zinc-500 text-xs font-bold mb-2 uppercase tracking-widest">Scan with iPhone to Play</p>
                        <div class="text-5xl font-black mb-12 tracking-widest text-blue-500">${roomCode}</div>
                        <div class="w-full max-w-lg">
                            <p class="text-left text-xs font-bold text-zinc-500 uppercase mb-4">Players in Lobby (${players.length}/${state.targetPlayers})</p>
                            <div class="grid grid-cols-2 gap-4">
                                ${players.map(p => `<div class="player-pill p-4 rounded-xl text-lg font-bold">✅ ${p.name}</div>`).join('')}
                            </div>
                        </div>
                    </div>`;
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.origin + window.location.pathname + "?join=" + roomCode,
                    width: 200, height: 200
                });
            } else if (state.step === 'playing') {
                const q = state.questions[state.currentIdx];
                ui.innerHTML = `
                    <div class="flex justify-between items-center mb-10 px-4">
                        <div class="px-4 py-2 bg-blue-600 rounded-full text-xs font-bold tracking-widest uppercase">${q.cat}</div>
                        <div class="text-4xl font-black text-blue-500">${state.timer}s</div>
                    </div>
                    <div class="bg-card p-16 mb-10 shadow-inner">
                        <h2 class="text-5xl font-bold leading-tight">${q.q}</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-6 opacity-80">
                        ${q.a.map((opt, i) => {
                            const colors = ['#ef4444', '#3b82f6', '#eab308', '#22c55e'];
                            const isCorrect =
