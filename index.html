<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Quiz Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg-card { background: #111; border: 1px solid #222; border-radius: 24px; }
        .answer-card { border-radius: 16px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .answer-card:active { transform: scale(0.97); }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; background: #7c3aed; }
        .timer-ring { transition: stroke-dashoffset 1s linear; stroke: #0ea5e9; }
        .fast-glow { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="game-ui" class="w-full max-w-4xl">
        <div class="text-center font-bold animate-pulse">BOOTING UP...</div>
    </div>

    <script>
        let state = {
            step: 'start',
            questions: [],
            currentIdx: 0,
            score: 0,
            timer: 20,
            revealTimer: 5,
            isRevealed: false,
            wasFast: false,
            isLoading: false
        };

        async function fetchQuestions(amount) {
            state.isLoading = true;
            render();
            try {
                // Filtered for 'Easy' and 'Medium' to fit 10-18 age range
                const diff = amount === 50 ? "" : "&difficulty=easy"; 
                const response = await fetch(`https://opentdb.com/api.php?amount=${amount}${diff}&type=multiple`);
                const data = await response.json();
                state.questions = data.results.map(q => ({
                    q: decodeHTML(q.question),
                    c: decodeHTML(q.correct_answer),
                    a: shuffle([...q.incorrect_answers.map(decodeHTML), decodeHTML(q.correct_answer)]),
                    cat: q.category.toUpperCase()
                }));
                state.step = 'play';
            } catch (e) { alert("Error fetching questions!"); }
            state.isLoading = false;
            render();
        }

        function decodeHTML(h) { const t = document.createElement("textarea"); t.innerHTML = h; return t.value; }
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function render() {
            const ui = document.getElementById('game-ui');
            if (state.isLoading) { ui.innerHTML = `<div class="text-center text-2xl font-black italic">PREPARING ARENA...</div>`; return; }

            if (state.step === 'start') {
                ui.innerHTML = `
                    <div class="bg-card p-12 text-center shadow-2xl">
                        <h1 class="text-5xl font-black mb-4 tracking-tighter italic">QUIZ PARTY</h1>
                        <p class="text-zinc-500 mb-10 font-medium">AGES 10-18 • GENERAL KNOWLEDGE</p>
                        <div class="grid grid-cols-3 gap-4 mb-8">
                            ${[10, 20, 50].map(n => `<button onclick="fetchQuestions(${n})" class="p-6 bg-zinc-800 rounded-2xl font-bold text-xl hover:bg-blue-600 transition">${n}</button>`).join('')}
                        </div>
                    </div>`;
            } else if (state.step === 'play') {
                const q = state.questions[state.currentIdx];
                ui.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-4">
                            <span class="badge">${q.cat}</span>
                            <span class="text-zinc-500 font-bold text-sm">Q ${state.currentIdx + 1}/${state.questions.length}</span>
                        </div>
                        <div class="relative w-14 h-14 flex items-center justify-center">
                            <svg class="absolute inset-0 w-full h-full -rotate-90">
                                <circle cx="28" cy="28" r="24" stroke="#222" stroke-width="5" fill="none" />
                                <circle cx="28" cy="28" r="24" stroke-width="5" fill="none" stroke-dasharray="151" stroke-dashoffset="${151 - (state.timer/20)*151}" class="timer-ring" />
                            </svg>
                            <span class="text-lg font-black">${state.timer}</span>
                        </div>
                    </div>

                    <div class="bg-card p-12 mb-8 text-center min-h-[220px] flex flex-col justify-center shadow-inner">
                        <h2 class="text-4xl font-bold leading-snug">${q.q}</h2>
                        ${state.wasFast ? `<div class="mt-4 fast-glow font-black italic uppercase tracking-widest text-sm">⚡ Fastest Answer Bonus!</div>` : ''}
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        ${q.a.map((opt, i) => {
                            const colors = ['#ef4444', '#3b82f6', '#f59e0b', '#10b981'];
                            const isCorrect = opt === q.c;
                            const dim = state.isRevealed && !isCorrect ? 'opacity-20 scale-95' : '';
                            const ring = state.isRevealed && isCorrect ? 'ring-4 ring-white' : '';
                            return `<button onclick="select('${opt}')" class="answer-card p-7 text-left font-bold text-2xl shadow-lg ${dim} ${ring}" style="background:${colors[i]}">${opt}</button>`;
                        }).join('')}
                    </div>

                    ${state.isRevealed ? `<div class="mt-10 text-center text-blue-400 font-black animate-pulse uppercase tracking-widest">Next Round in ${state.revealTimer}...</div>` : ''}
                `;
            } else {
                ui.innerHTML = `
                    <div class="bg-card p-12 text-center">
                        <h1 class="text-6xl font-black mb-4 italic">FINAL SCORE</h1>
                        <div class="text-8xl font-black text-blue-500 mb-12">${state.score}</div>
                        <div class="grid grid-cols-2 gap-6">
                            <button onclick="state.currentIdx=0;state.score=0;state.step='start';render();" class="py-5 bg-blue-600 rounded-2xl font-bold text-xl shadow-lg">REMATCH</button>
                            <button onclick="location.reload()" class="py-5 bg-zinc-800 rounded-2xl font-bold text-xl shadow-lg">QUIT</button>
                        </div>
                    </div>`;
            }
        }

        function select(ans) {
            if (state.isRevealed) return;
            if (ans === state.questions[state.currentIdx].c) {
                state.score += 10;
                if (state.timer > 15) { state.score += 5; state.wasFast = true; }
            }
            reveal();
        }

        function reveal() {
            state.isRevealed = true; state.revealTimer = 5; render();
            const rInt = setInterval(() => {
                state.revealTimer--; render();
                if (state.revealTimer <= 0) {
                    clearInterval(rInt); state.currentIdx++; state.isRevealed = false; state.wasFast = false; state.timer = 20;
                    if (state.currentIdx >= state.questions.length) state.step = 'end';
                    render();
                }
            }, 1000);
        }

        setInterval(() => { if (state.step === 'play' && !state.isRevealed) { state.timer--; render(); if (state.timer <= 0) reveal(); } }, 1000);
        render();
    </script>
</body>
</html>
