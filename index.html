<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Party - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg-card { background: #0a0a0a; border: 1px solid #222; border-radius: 24px; }
        .btn-ios { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; transition: all 0.2s; }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; display: inline-block !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div id="game-ui" class="w-full max-w-4xl"></div>

    <script>
        let peer, roomCode = "";
        let players = [];
        let state = {
            step: 'start',
            currentIdx: 0,
            questions: [],
            timer: 10,
            isRevealed: false,
            qAmount: 10,
            targetPlayers: 2
        };

        function render() {
            const ui = document.getElementById('game-ui');
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoin = urlParams.get('join');

            if (autoJoin || state.role === 'player') {
                renderPlayerView(ui, autoJoin);
                return;
            }

            if (state.step === 'start') {
                ui.innerHTML = `
                    <div class="bg-card p-12 max-w-md mx-auto">
                        <h1 class="text-4xl font-black mb-10 italic uppercase">Quiz Party</h1>
                        <div class="space-y-6 mb-10 text-left">
                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Questions</label>
                                <select id="qCount" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 font-bold mt-2">
                                    <option value="5">5</option><option value="10" selected>10</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Expected Players</label>
                                <select id="pCount" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-800 font-bold mt-2">
                                    <option value="1">1</option><option value="2" selected>2</option>
                                    <option value="4">4</option><option value="6">6</option><option value="8">8</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="setupLobby()" class="w-full py-5 bg-blue-600 rounded-2xl font-bold uppercase">Setup Hub</button>
                    </div>`;
            } else if (state.step === 'lobby') {
                const joinUrl = window.location.origin + window.location.pathname + "?join=" + roomCode;
                ui.innerHTML = `
                    <div class="bg-card p-10 flex flex-col items-center">
                        <div id="qrcode" class="mb-6"></div>
                        <div class="text-5xl font-black mb-8 text-blue-500">${roomCode}</div>
                        
                        <div class="w-full max-w-2xl mb-10">
                            <p class="text-zinc-500 font-bold mb-4 text-xs uppercase text-center">Joined: ${players.length} / ${state.targetPlayers}</p>
                            <div class="grid grid-cols-2 gap-3">
                                ${players.map(p => `<div class="p-3 bg-zinc-900 rounded-xl border border-zinc-800 font-bold italic">✅ ${p.name}</div>`).join('')}
                            </div>
                        </div>

                        <button onclick="startMatch()" class="w-full py-5 bg-white text-black font-bold rounded-2xl ${players.length >= state.targetPlayers ? 'animate-bounce' : 'opacity-50'}">
                            ${players.length >= state.targetPlayers ? 'START GAME' : 'FORCE START'}
                        </button>
                    </div>`;
                
                setTimeout(() => { new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 180, height: 180 }); }, 50);
            } else if (state.step === 'playing') {
                const q = state.questions[state.currentIdx];
                ui.innerHTML = `
                    <div class="flex justify-between items-center mb-6 px-4">
                        <div class="text-5xl font-black text-blue-500">${state.timer}s</div>
                        <div class="text-zinc-500 font-bold uppercase text-xs">Round ${state.currentIdx + 1}</div>
                    </div>
                    <div class="bg-card p-10 mb-8 min-h-[200px] flex items-center justify-center">
                        <h2 class="text-3xl font-bold uppercase italic">${q.q}</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${q.a.map(opt => `<div class="p-8 rounded-2xl text-xl font-black ${state.isRevealed ? (opt === q.c ? 'ring-8 ring-white' : 'opacity-10') : ''}" style="background:${opt === q.c && state.isRevealed ? '#22c55e' : '#1a1a1a'}">${opt}</div>`).join('')}
                    </div>`;
            } else if (state.step === 'end') {
                ui.innerHTML = `<div class="bg-card p-10"><h1 class="text-4xl font-black mb-8 uppercase text-blue-500">Standings</h1>${players.sort((a,b)=>b.score-a.score).map(p=>`<div class="flex justify-between p-4 bg-zinc-900 rounded-xl mb-2 font-bold"><span>${p.name}</span><span>${p.score}</span></div>`).join('')}<button onclick="location.reload()" class="mt-8 w-full py-4 bg-white text-black font-bold rounded-xl">RESTART</button></div>`;
            }
        }

        function setupLobby() {
            state.qAmount = document.getElementById('qCount').value;
            state.targetPlayers = parseInt(document.getElementById('pCount').value);
            roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            state.step = 'lobby';
            render();

            peer = new Peer(roomCode);
            peer.on('connection', (c) => {
                c.on('data', (d) => {
                    if (d.type === 'join') {
                        const cleanName = d.name.trim();
                        // Block empty names or duplicates
                        if (cleanName !== "" && !players.some(p => p.name === cleanName)) {
                            players.push({ name: cleanName, score: 0, conn: c, lastIdx: -1 });
                            render();
                        }
                    }
                    if (d.type === 'answer' && !state.isRevealed) {
                        const p = players.find(p => p.conn.peer === c.peer);
                        if (p && p.lastIdx < state.currentIdx) {
                            p.lastIdx = state.currentIdx;
                            if (d.ans === state.questions[state.currentIdx].c) p.score += 10;
                        }
                    }
                });
            });
        }

        async function startMatch() {
            if (players.length === 0) return alert("Need at least 1 player!");
            const res = await fetch(`https://opentdb.com/api.php?amount=${state.qAmount}&difficulty=easy&type=multiple`);
            const d = await res.json();
            state.questions = d.results.map(q => ({ q: decodeHTML(q.question), c: decodeHTML(q.correct_answer), a: [...q.incorrect_answers.map(decodeHTML), decodeHTML(q.correct_answer)].sort(() => Math.random()-0.5) }));
            state.step = 'playing';
            state.currentIdx = 0;
            broadcast();
            startTimer();
        }

        function broadcast() {
            players.forEach(p => p.conn.send({ type: 'sync', step: state.step, q: state.questions[state.currentIdx], idx: state.currentIdx }));
            render();
        }

        function reveal() {
            state.isRevealed = true; render();
            setTimeout(() => {
                state.currentIdx++;
                if (state.currentIdx >= state.questions.length) { 
                    state.step = 'end'; 
                    players.forEach(p => p.conn.send({ type: 'sync', step: 'end' }));
                    render(); 
                } else { 
                    state.isRevealed = false; state.timer = 10; broadcast(); 
                }
            }, 3000);
        }

        function startTimer() {
            setInterval(() => { if (state.step === 'playing' && !state.isRevealed) { state.timer--; render(); if (state.timer <= 0) reveal(); } }, 1000);
        }

        function renderPlayerView(ui, auto) {
            if (state.playerStep === 'playing' && state.activeQ) {
                ui.innerHTML = `<div class="bg-card p-6"><div class="grid grid-cols-1 gap-4">${state.activeQ.a.map(opt => `<button onclick="sendAns('${opt}')" class="p-10 btn-ios font-black text-xl uppercase">${opt}</button>`).join('')}</div></div>`;
            } else if (state.playerStep === 'locked') {
                ui.innerHTML = `<div class="bg-card p-12 text-blue-500 font-black animate-pulse uppercase text-2xl italic">Locked In</div>`;
            } else if (state.playerStep === 'end') {
                ui.innerHTML = `<div class="bg-card p-12"><h2 class="text-2xl font-black mb-8 uppercase">Game Finished</h2><button onclick="location.reload()" class="w-full py-6 bg-white text-black font-bold rounded-2xl">RESTART</button></div>`;
            } else {
                ui.innerHTML = `<div class="bg-card p-8"><input id="pName" type="text" placeholder="NAME" class="w-full p-5 bg-zinc-900 rounded-2xl mb-4 text-center font-bold uppercase"><button onclick="join('${auto}')" class="w-full py-5 bg-blue-600 rounded-2xl font-bold uppercase">Join Game</button></div>`;
            }
        }

        function join(code) {
            state.role = 'player';
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(code.toUpperCase());
                state.myConn = conn;
                conn.on('open', () => { 
                    conn.send({ type: 'join', name: document.getElementById('pName').value }); 
                    state.playerStep = 'waiting'; render(); 
                });
                conn.on('data', (d) => {
                    if (d.type === 'sync') { state.playerStep = d.step; state.activeQ = d.q; state.activeIdx = d.idx; render(); }
                });
            });
        }

        function sendAns(ans) { state.myConn.send({ type: 'answer', ans: ans }); state.playerStep = 'locked'; render(); }
        function decodeHTML(h) { const t = document.createElement("textarea"); t.innerHTML = h; return t.value; }
        render();
    </script>
</body>
</html>
