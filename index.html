<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Party Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg-card { background: #0a0a0a; border: 1px solid #222; border-radius: 24px; }
        .btn-ios { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-ios:active { background: #007AFF; transform: scale(0.95); }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; display: inline-block !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div id="game-ui" class="w-full max-w-4xl">
        <div class="animate-pulse font-black text-xl italic uppercase tracking-widest">Initialising...</div>
    </div>

    <script>
        let peer, roomCode = "";
        let players = [];
        let state = {
            step: 'start',
            currentIdx: 0,
            questions: [],
            timer: 10,
            isRevealed: false
        };

        function render() {
            const ui = document.getElementById('game-ui');
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoin = urlParams.get('join');

            if (autoJoin || state.role === 'player') {
                renderPlayerView(ui, autoJoin);
                return;
            }

            if (state.step === 'start') {
                ui.innerHTML = `<div class="bg-card p-12 max-w-md mx-auto"><h1 class="text-4xl font-black mb-10 italic uppercase">Quiz Party</h1><button onclick="initHost()" class="w-full py-5 bg-blue-600 rounded-2xl font-bold">CREATE LOBBY</button></div>`;
            } else if (state.step === 'lobby') {
                ui.innerHTML = `
                    <div class="bg-card p-10 flex flex-col items-center shadow-2xl">
                        <div id="qrcode" class="mb-6"></div>
                        <div class="text-5xl font-black mb-6 text-blue-500 tracking-widest">${roomCode}</div>
                        <div class="w-full max-w-lg mb-8">
                            <p class="text-zinc-500 font-bold mb-4 uppercase text-xs">Players Joined: ${players.length}</p>
                            <div class="grid grid-cols-2 gap-2">
                                ${players.map(p => `<div class="p-3 bg-zinc-900 rounded-xl border border-zinc-800 font-bold italic">✅ ${p.name}</div>`).join('')}
                            </div>
                        </div>
                        ${players.length > 0 ? `<button onclick="startMatch()" class="w-full py-5 bg-white text-black font-bold rounded-2xl animate-bounce">START GAME NOW</button>` : `<p class="text-zinc-600 animate-pulse">Waiting for players to scan...</p>`}
                    </div>`;
                new QRCode(document.getElementById("qrcode"), { text: window.location.origin + window.location.pathname + "?join=" + roomCode, width: 160, height: 160 });
            } else if (state.step === 'playing') {
                const q = state.questions[state.currentIdx];
                ui.innerHTML = `<div class="flex justify-between items-center mb-6 px-4"><div class="text-5xl font-black text-blue-500">${state.timer}s</div><div class="text-zinc-500 font-bold">Question ${state.currentIdx + 1}/10</div></div><div class="bg-card p-10 mb-8 min-h-[200px] flex items-center justify-center"><h2 class="text-3xl font-bold uppercase italic">${q.q}</h2></div><div class="grid grid-cols-2 gap-4">${q.a.map(opt => `<div class="p-6 rounded-2xl text-lg font-black transition-all ${state.isRevealed ? (opt === q.c ? 'ring-8 ring-white' : 'opacity-10') : ''}" style="background:${opt === q.c && state.isRevealed ? '#22c55e' : '#1a1a1a'}">${opt}</div>`).join('')}</div>`;
            } else if (state.step === 'end') {
                ui.innerHTML = `
                    <div class="bg-card p-10 shadow-2xl">
                        <h1 class="text-5xl font-black mb-8 italic uppercase text-blue-500 italic">Leaderboard</h1>
                        <div class="space-y-3 mb-10">
                            ${players.sort((a,b)=>b.score-a.score).map((p, i)=>`
                                <div class="flex justify-between p-5 ${i===0?'bg-blue-600':'bg-zinc-900'} rounded-xl font-black text-xl">
                                    <span>${i+1}. ${p.name}</span>
                                    <span>${p.score} pts</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="location.reload()" class="py-5 bg-white text-black font-bold rounded-2xl uppercase text-sm">Main Menu</button>
                            <button onclick="state.step='lobby';startMatch()" class="py-5 bg-zinc-800 text-white font-bold rounded-2xl uppercase text-sm">Replay</button>
                        </div>
                    </div>`;
            }
        }

        // --- HOST HUB LOGIC ---
        function initHost() {
            roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new Peer(roomCode);
            peer.on('open', () => { state.step = 'lobby'; render(); });
            peer.on('connection', (c) => {
                c.on('data', (d) => {
                    if (d.type === 'join') { players.push({ name: d.name, score: 0, conn: c, lastIdx: -1 }); render(); }
                    if (d.type === 'answer' && !state.isRevealed) {
                        const p = players.find(p => p.conn.peer === c.peer);
                        if (p && p.lastIdx < state.currentIdx) {
                            p.lastIdx = state.currentIdx;
                            if (d.ans === state.questions[state.currentIdx].c) p.score += 10;
                        }
                    }
                });
            });
        }

        async function startMatch() {
            const res = await fetch(`https://opentdb.com/api.php?amount=10&difficulty=easy&type=multiple`);
            const d = await res.json();
            state.questions = d.results.map(q => ({ q: decodeHTML(q.question), c: decodeHTML(q.correct_answer), a: [...q.incorrect_answers.map(decodeHTML), decodeHTML(q.correct_answer)].sort(() => Math.random()-0.5) }));
            state.step = 'playing';
            state.currentIdx = 0;
            broadcastQuestion();
            startTimer();
        }

        function broadcastQuestion() {
            players.forEach(p => p.conn.send({ type: 'push_q', q: state.questions[state.currentIdx], idx: state.currentIdx }));
            render();
        }

        function reveal() {
            state.isRevealed = true; render();
            setTimeout(() => {
                state.currentIdx++;
                if (state.currentIdx >= state.questions.length) { 
                    state.step = 'end'; 
                    players.forEach(p => p.conn.send({ type: 'game_over' }));
                    render(); 
                } 
                else { state.isRevealed = false; state.timer = 10; broadcastQuestion(); }
            }, 3000);
        }

        function startTimer() {
            const timerInt = setInterval(() => { 
                if (state.step === 'playing' && !state.isRevealed) { 
                    state.timer--; render(); 
                    if (state.timer <= 0) { reveal(); } 
                } else if (state.step !== 'playing') {
                    clearInterval(timerInt);
                }
            }, 1000);
        }

        // --- CONTROLLER LOGIC ---
        function renderPlayerView(ui, auto) {
            if (state.playerStep === 'active' && state.activeQ) {
                ui.innerHTML = `<div class="bg-card p-6"><div class="grid grid-cols-1 gap-4">${state.activeQ.a.map(opt => `<button onclick="sendAns('${opt}')" class="p-10 btn-ios font-black text-xl uppercase">${opt}</button>`).join('')}</div></div>`;
            } else if (state.playerStep === 'locked') {
                ui.innerHTML = `<div class="bg-card p-12 text-blue-500 font-black animate-pulse uppercase text-2xl">Answer Sent!</div>`;
            } else if (state.playerStep === 'game_over') {
                ui.innerHTML = `<div class="bg-card p-10"><h2 class="text-2xl font-black mb-6 uppercase">Game Over</h2><button onclick="location.reload()" class="w-full py-5 bg-white text-black font-bold rounded-2xl">PLAY AGAIN</button></div>`;
            } else {
                ui.innerHTML = `<div class="bg-card p-8"><input id="pName" type="text" placeholder="NAME" class="w-full p-5 bg-zinc-900 rounded-2xl mb-4 text-center font-bold uppercase"><button onclick="join('${auto}')" class="w-full py-5 bg-blue-600 rounded-2xl font-bold">JOIN GAME</button></div>`;
            }
        }

        function join(code) {
            state.role = 'player';
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(code.toUpperCase());
                state.myConn = conn;
                conn.on('open', () => { conn.send({ type: 'join', name: document.getElementById('pName').value }); state.playerStep = 'connected'; render(); });
                conn.on('data', (d) => {
                    if (d.type === 'push_q') { state.activeQ = d.q; state.activeIdx = d.idx; state.playerStep = 'active'; render(); }
                    if (d.type === 'game_over') { state.playerStep = 'game_over'; render(); }
                });
            });
        }

        function sendAns(ans) { state.myConn.send({ type: 'answer', ans: ans }); state.playerStep = 'locked'; render(); }
        function decodeHTML(h) { const t = document.createElement("textarea"); t.innerHTML = h; return t.value; }
        render();
    </script>
</body>
</html>
