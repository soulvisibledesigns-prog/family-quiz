<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Party - Deep Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .bg-card { background: #0a0a0a; border: 1px solid #222; border-radius: 24px; }
        .btn-ios { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-ios:active { background: #007AFF; transform: scale(0.95); }
        #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 12px; display: inline-block !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div id="game-ui" class="w-full max-w-4xl">
        <div class="animate-pulse font-black text-xl italic uppercase tracking-widest">Rebuilding Connection...</div>
    </div>

    <script>
        let peer, roomCode = "";
        let players = [];
        let state = {
            step: 'start',
            targetPlayers: 2,
            currentIdx: 0,
            questions: [],
            timer: 10,
            isRevealed: false
        };

        function render() {
            const ui = document.getElementById('game-ui');
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoin = urlParams.get('join');

            if (autoJoin || state.role === 'player') {
                renderPlayerView(ui, autoJoin);
                return;
            }

            // --- HOST VIEW ---
            if (state.step === 'start') {
                ui.innerHTML = `<div class="bg-card p-12 max-w-md mx-auto"><h1 class="text-4xl font-black mb-10 italic uppercase">Quiz Party</h1><button onclick="initHost()" class="w-full py-5 bg-blue-600 rounded-2xl font-bold">START HUB</button></div>`;
            } else if (state.step === 'lobby') {
                ui.innerHTML = `<div class="bg-card p-10 flex flex-col items-center"><div id="qrcode" class="mb-6"></div><div class="text-5xl font-black mb-8 text-blue-500">${roomCode}</div><p class="text-zinc-500 font-bold mb-4">PLAYERS: ${players.length}/${state.targetPlayers}</p><div class="grid grid-cols-2 gap-2">${players.map(p => `<div class="p-3 bg-zinc-900 rounded-lg border border-zinc-800 font-bold">✅ ${p.name}</div>`).join('')}</div></div>`;
                new QRCode(document.getElementById("qrcode"), { text: window.location.href + "?join=" + roomCode, width: 160, height: 160 });
            } else if (state.step === 'playing') {
                const q = state.questions[state.currentIdx];
                ui.innerHTML = `<div class="flex justify-between items-center mb-6 px-4"><div class="text-5xl font-black text-blue-500">${state.timer}s</div><div class="text-zinc-500 font-bold">Q: ${state.currentIdx + 1}/10</div></div><div class="bg-card p-10 mb-8 min-h-[200px] flex items-center justify-center"><h2 class="text-3xl font-bold uppercase italic">${q.q}</h2></div><div class="grid grid-cols-2 gap-4">${q.a.map(opt => `<div class="p-6 rounded-2xl text-lg font-black ${state.isRevealed ? (opt === q.c ? 'ring-8 ring-white' : 'opacity-10') : ''}" style="background:${opt === q.c && state.isRevealed ? '#22c55e' : '#1a1a1a'}">${opt}</div>`).join('')}</div>`;
            } else if (state.step === 'end') {
                ui.innerHTML = `<div class="bg-card p-10"><h1 class="text-4xl font-black mb-8">FINISH</h1>${players.sort((a,b)=>b.score-a.score).map(p=>`<div class="flex justify-between p-4 bg-zinc-900 rounded-xl mb-2"><span>${p.name}</span><span>${p.score}</span></div>`).join('')}<button onclick="location.reload()" class="mt-8 w-full py-4 bg-white text-black font-bold rounded-xl">RESTART</button></div>`;
            }
        }

        // --- HOST LOGIC ---
        function initHost() {
            roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new Peer(roomCode);
            peer.on('open', () => { state.step = 'lobby'; render(); });
            peer.on('connection', (c) => {
                c.on('data', (d) => {
                    if (d.type === 'join') { players.push({ name: d.name, score: 0, conn: c, lastIdx: -1 }); render(); if (players.length >= state.targetPlayers) startMatch(); }
                    if (d.type === 'answer' && !state.isRevealed) {
                        const p = players.find(p => p.conn.peer === c.peer);
                        if (p && p.lastIdx < state.currentIdx) {
                            p.lastIdx = state.currentIdx;
                            if (d.ans === state.questions[state.currentIdx].c) p.score += 10;
                        }
                    }
                });
            });
        }

        async function startMatch() {
            const res = await fetch(`https://opentdb.com/api.php?amount=10&difficulty=easy&type=multiple`);
            const d = await res.json();
            state.questions = d.results.map(q => ({ q: decodeHTML(q.question), c: decodeHTML(q.correct_answer), a: [...q.incorrect_answers.map(decodeHTML), decodeHTML(q.correct_answer)].sort(() => Math.random()-0.5) }));
            state.step = 'playing';
            broadcastQuestion();
            startTimer();
        }

        function broadcastQuestion() {
            players.forEach(p => p.conn.send({ type: 'push_q', q: state.questions[state.currentIdx], idx: state.currentIdx }));
            render();
        }

        function reveal() {
            state.isRevealed = true; render();
            setTimeout(() => {
                state.currentIdx++;
                if (state.currentIdx >= state.questions.length) { state.step = 'end'; render(); } 
                else { state.isRevealed = false; state.timer = 10; broadcastQuestion(); }
            }, 3000);
        }

        function startTimer() {
            setInterval(() => { if (state.step === 'playing' && !state.isRevealed) { state.timer--; render(); if (state.timer <= 0) reveal(); } }, 1000);
        }

        // --- PLAYER LOGIC ---
        function renderPlayerView(ui, auto) {
            if (state.playerStep === 'active' && state.activeQ) {
                ui.innerHTML = `<div class="bg-card p-6"><p class="text-[10px] font-bold text-zinc-600 mb-4 uppercase">Round ${state.activeIdx + 1}</p><div class="grid grid-cols-1 gap-4">${state.activeQ.a.map(opt => `<button onclick="sendAns('${opt}')" class="p-10 btn-ios font-black text-xl uppercase">${opt}</button>`).join('')}</div></div>`;
            } else if (state.playerStep === 'locked') {
                ui.innerHTML = `<div class="bg-card p-12 text-blue-500 font-black animate-pulse uppercase text-2xl">Locked In</div>`;
            } else {
                ui.innerHTML = `<div class="bg-card p-8"><input id="pName" type="text" placeholder="NAME" class="w-full p-5 bg-zinc-900 rounded-2xl mb-4 text-center font-bold uppercase"><button onclick="join('${auto}')" class="w-full py-5 bg-blue-600 rounded-2xl font-bold">JOIN GAME</button></div>`;
            }
        }

        function join(code) {
            state.role = 'player';
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(code.toUpperCase());
                state.myConn = conn;
                conn.on('open', () => { conn.send({ type: 'join', name: document.getElementById('pName').value }); state.playerStep = 'connected'; render(); });
                conn.on('data', (d) => {
                    if (d.type === 'push_q') { state.activeQ = d.q; state.activeIdx = d.idx; state.playerStep = 'active'; render(); }
                });
            });
        }

        function sendAns(ans) { state.myConn.send({ type: 'answer', ans: ans }); state.playerStep = 'locked'; render(); }
        function decodeHTML(h) { const t = document.createElement("textarea"); t.innerHTML = h; return t.value; }
        render();
    </script>
</body>
</html>
