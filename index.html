<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>General Knowledge Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .ios-card { background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 24px; }
        .timer-fill { height: 100%; background: #30d158; transition: width 1s linear; }
        .option-btn { background: #2c2c2e; transition: transform 0.1s; }
        .option-btn:active { transform: scale(0.96); background: #0a84ff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="game-container" class="w-full max-w-lg ios-card p-8 shadow-2xl relative">
        </div>

    <script>
        const quizData = [
            { q: "Which planet is known as the 'Red Planet'?", a: ["Venus", "Mars", "Jupiter", "Saturn"], c: "Mars", cat: "Science" },
            { q: "Who painted the 'Mona Lisa'?", a: ["Van Gogh", "Picasso", "Da Vinci", "Monet"], c: "Da Vinci", cat: "Art" },
            { q: "What is the capital city of Japan?", a: ["Seoul", "Beijing", "Bangkok", "Tokyo"], c: "Tokyo", cat: "Geography" },
            { q: "Which ocean is the largest on Earth?", a: ["Atlantic", "Indian", "Arctic", "Pacific"], c: "Pacific", cat: "Science" },
            { q: "What year did World War II end?", a: ["1941", "1945", "1950", "1939"], c: "1945", cat: "History" }
        ];

        let state = {
            step: 'lobby',
            qIndex: 0,
            score: 0,
            timer: 10
        };

        function render() {
            const container = document.getElementById('game-container');
            
            if (state.step === 'lobby') {
                container.innerHTML = `
                    <h1 class="text-3xl font-black text-center mb-2">QUIZ PARTY</h1>
                    <p class="text-zinc-500 text-center mb-8">General Knowledge Edition</p>
                    <button onclick="start()" class="w-full py-5 bg-blue-600 rounded-2xl font-bold text-lg">START GAME</button>
                `;
            } else if (state.step === 'playing') {
                const item = quizData[state.qIndex];
                container.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-1 bg-zinc-800 rounded-t-2xl">
                        <div id="timer-bar" class="timer-fill" style="width: 100%"></div>
                    </div>
                    <div class="flex justify-between mb-6 mt-2 text-xs font-bold uppercase tracking-widest">
                        <span class="text-blue-500">${item.cat}</span>
                        <span class="text-zinc-500">Score: ${state.score}</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-8 leading-tight">${item.q}</h2>
                    <div class="grid gap-3">
                        ${item.a.map(opt => `<button onclick="submit('${opt}')" class="option-btn p-5 rounded-2xl text-left font-medium">${opt}</button>`).join('')}
                    </div>
                `;
                runTimer();
            } else {
                container.innerHTML = `
                    <div class="text-center">
                        <h2 class="text-zinc-500 uppercase text-sm font-bold mb-2">Final Score</h2>
                        <div class="text-7xl font-black mb-10">${state.score}</div>
                        <button onclick="location.reload()" class="w-full py-5 bg-white text-black font-bold rounded-2xl">PLAY AGAIN</button>
                    </div>
                `;
            }
        }

        function start() {
            state.step = 'playing';
            render();
        }

        function submit(ans) {
            if (ans === quizData[state.qIndex].c) state.score += 10;
            next();
        }

        function next() {
            clearInterval(window.itv);
            state.qIndex++;
            if (state.qIndex >= quizData.length) {
                state.step = 'end';
            }
            render();
        }

        function runTimer() {
            clearInterval(window.itv);
            state.timer = 10;
            window.itv = setInterval(() => {
                state.timer--;
                const bar = document.getElementById('timer-bar');
                if (bar) bar.style.width = (state.timer / 10) * 100 + "%";
                
                if (state.timer <= 0) next();
            }, 1000);
        }

        render();
    </script>
</body>
</html>
